<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Панель Kasper Ai 🤖</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root { 
    --bg: #0a0a0a; 
    --card: #161616; 
    --accent: #00ff88; 
    --text: #ffffff; 
    --faded: #888; 
    --red: #ff4d4d; 
    --border: #262626;
}

/* ФОН */
body {
    margin: 0;
    height: 100vh;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
}

/* ГЛАВНАЯ ПАНЕЛЬ (как на скрине) */
.dashboard-grid {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    
    display: flex;
    gap: 15px;

    z-index: 1000;
}

/* КОЛОНКИ */
.column {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* ПАНЕЛИ */
.panel { 
    width: 260px;
    padding: 12px;

    background: rgba(15,15,15,0.85);
    backdrop-filter: blur(6px);

    border-radius: 12px; 
    border: 1px solid var(--border); 
}

/* ЗАГОЛОВКИ */
h2 {
    font-size: 0.75rem;
    margin: 0 0 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--accent);
    text-transform: uppercase;
}

/* INPUT / TEXTAREA */
textarea, input {
    width: 100%;
    background: #000;
    border: 1px solid #333;
    color: #fff;
    border-radius: 6px;
    padding: 8px;
    font-size: 12px;
    outline: none;
}

textarea:focus, input:focus {
    border-color: var(--accent);
}

/* КНОПКИ */
.btn-save {
    width: 100%;
    height: 34px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
}

.btn-red {
    background: var(--red) !important;
    color: #fff !important;
}

.btn-instant {
    width: 40px;
    background: #222;
    border: 1px solid #444;
    border-radius: 6px;
    cursor: pointer;
}

/* КВОТА */
.quota-bg {
    background: #000;
    height: 8px;
    border-radius: 10px;
    overflow: hidden;
}

#quota-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
}

/* ПЕРЕКЛЮЧАТЕЛЬ */
.switch {
    position: relative;
    width: 30px;
    height: 16px;
}
.switch input { display:none; }

.slider {
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    background:#444;
    border-radius:20px;
}
.slider:before {
    content:"";
    position:absolute;
    width:10px; height:10px;
    left:3px; bottom:3px;
    background:#fff;
    border-radius:50%;
}
input:checked + .slider {
    background: var(--accent);
}
input:checked + .slider:before {
    transform: translateX(14px);
}

/* СОЦ СЕТИ */
.social-tag {
    background:#222;
    border:1px solid #444;
    border-radius:6px;
    padding:4px 6px;
    display:flex;
    gap:5px;
    font-size:10px;
}

.remove-link {
    color:red;
    cursor:pointer;
}

/* ЮЗЕРЫ */
.user-row {
    display:flex;
    justify-content:space-between;
    background:#000;
    padding:6px;
    border-radius:5px;
    font-size:11px;
}

.btn-ban {
    background:var(--red);
    border:none;
    color:#fff;
    font-size:9px;
    padding:3px 6px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="dashboard-grid">

    <!-- ЛЕВАЯ -->
    <div class="column">

        <div class="panel">
            <h2><i class="fas fa-chart-line"></i> Квота</h2>
            <div style="display:flex; justify-content:space-between; font-size:11px;">
                <span id="stat-chat">0</span>
                <span id="stat-clean">0</span>
                <span id="quota-val">0</span>
            </div>
            <div class="quota-bg"><div id="quota-fill"></div></div>
        </div>

        <div class="panel">
            <h2><i class="fas fa-brain"></i> Характер</h2>
            <textarea id="t-char" rows="4"></textarea>
            <button class="btn-save" onclick="saveField('bot_persona','t-char')">Сохранить</button>
        </div>

    </div>

    <!-- ЦЕНТР -->
    <div class="column">

        <div class="panel" style="border:1px solid var(--accent);">
            <h2><i class="fas fa-play"></i> Стрим</h2>
            <input id="streamUrl" placeholder="Ссылка">
            <div style="display:flex; gap:5px; margin-top:5px;">
                <button class="btn-save" onclick="controlBot('start')">СТАРТ</button>
                <button class="btn-save btn-red" onclick="controlBot('stop')">СТОП</button>
            </div>
            <p id="bot-status" style="font-size:10px; text-align:center;"></p>
        </div>

        <div class="panel">
            <h2><i class="fas fa-users"></i> Чат</h2>
            <div id="user-list"></div>
        </div>

    </div>

    <!-- ПРАВАЯ -->
    <div class="column">

        <div class="panel">
            <h2><i class="fas fa-ad"></i> Реклама</h2>
            <textarea id="t-ads" rows="2"></textarea>
            <div style="display:flex; gap:5px;">
                <input type="number" id="ads_timer" value="300">
                <label class="switch">
                    <input type="checkbox" id="ads_enabled">
                    <span class="slider"></span>
                </label>
            </div>
            <button class="btn-save" onclick="saveTimedTask('ads')">OK</button>
        </div>

        <div class="panel">
            <h2><i class="fas fa-share-nodes"></i> Соцсети</h2>
            <div style="display:flex;">
                <input id="social-input">
                <button class="btn-instant" onclick="addSocialLink()">+</button>
            </div>
            <div id="social-tags"></div>
        </div>

        <div class="panel">
            <h2><i class="fas fa-filter"></i> Фильтр</h2>
            <textarea id="t-bad-words" rows="2"></textarea>
            <input type="number" id="ban_duration" value="300">
            <button class="btn-save" onclick="saveBanSettings()">OK</button>
        </div>

    </div>

</div>


    <script>
        const SB_URL = 'https://qidsqhxufgldvdsymtyn.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpZHNxaHh1ZmdsZHZkc3ltdHluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDQyMTksImV4cCI6MjA4OTY4MDIxOX0.PnGnONyBO8PkisjzcPcWK4Mql-cZ_vZAZm0SjDsWjew';        
        const RAILWAY_URL = 'https://aleshabot-production.up.railway.app';

        const params = new URLSearchParams(window.location.search);
        const tgId = params.get('id');
        const token = params.get('token');

        let socialLinks = [];

        function getSocialIcon(url) {
            if (url.includes('t.me')) return 'fab fa-telegram';
            if (url.includes('vk.com')) return 'fab fa-vk';
            if (url.includes('youtube.com')) return 'fab fa-youtube';
            return 'fas fa-link';
        }

        function addSocialLink() {
            const val = document.getElementById('social-input').value.trim();
            if(val && !socialLinks.includes(val)) {
                socialLinks.push(val);
                renderSocialTags();
                document.getElementById('social-input').value = '';
            }
        }

        function removeSocialLink(i) { socialLinks.splice(i, 1); renderSocialTags(); }

        function renderSocialTags() {
            document.getElementById('social-tags').innerHTML = socialLinks.map((url, i) => `
                <div class="social-tag"><i class="${getSocialIcon(url)}"></i><span>${url}</span><span class="remove-link" onclick="removeSocialLink(${i})">×</span></div>
            `).join('');
        }

        async function saveSocialSettings() {
            await supabaseUpdate({
                social_text: JSON.stringify(socialLinks),
                social_timer: parseInt(document.getElementById('social_timer').value),
                social_enabled: document.getElementById('social_enabled').checked
            });
            alert("Сохранено!");
        }

        async function saveBanSettings() {
            await supabaseUpdate({
                word_filter: document.getElementById('t-bad-words').value,
                ban_duration: parseInt(document.getElementById('ban_duration').value)
            });
            alert("Сохранено!");
        }

        async function saveTimedTask(p) {
            await supabaseUpdate({
                [`${p}_text`]: document.getElementById(`t-${p}`).value,
                [`${p}_timer`]: parseInt(document.getElementById(`${p}_timer`).value),
                [`${p}_enabled`]: document.getElementById(`${p}_enabled`).checked
            });
            alert("✅ Настройки обновлены!");
        }

        async function saveField(f, id) {
            await supabaseUpdate({ [f]: document.getElementById(id).value });
            alert("✅ Сохранено!");
        }

        async function controlBot(action) {
            const stream = document.getElementById('streamUrl').value;
            await fetch(`${RAILWAY_URL}/bot_control?action=${action}&id=${tgId}&token=${token}&stream=${encodeURIComponent(stream)}`);
            alert("Команда отправлена");
        }

        async function supabaseUpdate(d) {
            await fetch(`${SB_URL}/rest/v1/users?tg_id=eq.${tgId}`, {
                method: 'PATCH',
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(d)
            });
        }

        async function loadData() {
            if(!tgId) return;
            const rUser = await fetch(`${SB_URL}/rest/v1/users?tg_id=eq.${tgId}`, {
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
            });
            const uArr = await rUser.json();
            if (uArr[0]) {
                const u = uArr[0];
                document.getElementById('stat-chat').innerText = u.stat_chat || 0;
                document.getElementById('stat-clean').innerText = u.stat_clean || 0;
                document.getElementById('t-char').value = u.bot_persona || '';
                document.getElementById('t-ads').value = u.ads_text || '';
                document.getElementById('ads_timer').value = u.ads_timer || 300;
                document.getElementById('ads_enabled').checked = u.ads_enabled;
                document.getElementById('t-greet').value = u.greet_text || '';
                document.getElementById('greet_timer').value = u.greet_timer || 1200;
                document.getElementById('greet_enabled').checked = u.greet_enabled;
                document.getElementById('t-bad-words').value = u.word_filter || '';
                document.getElementById('ban_duration').value = u.ban_duration || 300;
                socialLinks = JSON.parse(u.social_text || "[]");
                renderSocialTags();
                document.getElementById('social_timer').value = u.social_timer || 600;
                document.getElementById('social_enabled').checked = u.social_enabled;
            }
        }
        window.onload = loadData;
    </script>
</body>
</html>
