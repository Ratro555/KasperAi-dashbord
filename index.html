<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Kasper Ai 🤖</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0a0a0a; 
            --card: #161616; 
            --accent: #00ff88; 
            --text: #ffffff; 
            --faded: #888888; 
            --red: #ff4d4d; 
            --border: #262626;
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; max-width: 1300px; margin-top: 20px; }
        .panel { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        h2 { font-size: 0.85rem; margin-top: 0; display: flex; align-items: center; gap: 8px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-save { width: 100%; background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-save:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-instant { background: #222; color: white; width: 50px; border-radius: 8px; border: 1px solid #444; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        textarea, input { width: 100%; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; padding: 12px; box-sizing: border-box; font-size: 14px; outline: none; }
        .timer-settings { display: flex; align-items: center; gap: 10px; margin-top: 10px; background: #000; padding: 10px; border-radius: 8px; border: 1px solid #222; }
        .timer-settings input { width: 80px; text-align: center; padding: 5px; }
        
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(16px); }

        .social-tag { background: #222; border: 1px solid #444; border-radius: 6px; padding: 5px 10px; display: flex; align-items: center; gap: 8px; font-size: 11px; margin-bottom: 5px; }
        .social-tag i { color: var(--accent); }
        .social-tag .remove-link { color: var(--red); cursor: pointer; font-weight: bold; margin-left: auto; }

        @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <h1>Панель Kasper Ai 🤖</h1>

    <div class="dashboard-grid">
        <div class="column">
            <div class="panel">
                <h2><i class="fas fa-chart-line"></i> Мониторинг</h2>
                <div style="display:flex; justify-content:space-around; text-align:center;">
                    <div><b id="stat-chat" style="color:var(--accent)">0</b><br><small>Чат</small></div>
                    <div><b id="stat-clean" style="color:var(--red)">0</b><br><small>Чистка</small></div>
                </div>
            </div>

            <div class="panel" style="margin-top:20px;">
                <h2><i class="fas fa-brain"></i> Характер Ai</h2>
                <textarea id="t-char" rows="6"></textarea>
                <button class="btn-save" onclick="saveField('bot_persona', 't-char')">Сохранить</button>
            </div>
        </div>

        <div class="column">
            <div class="panel">
                <h2><i class="fas fa-play"></i> Управление</h2>
                <input type="text" id="streamUrl" placeholder="Ссылка на стрим">
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="btn-save" onclick="controlBot('start')">СТАРТ</button>
                    <button class="btn-save" style="background:var(--red)" onclick="controlBot('stop')">СТОП</button>
                </div>
            </div>

            <div class="panel" style="margin-top:20px;">
                <h2><i class="fas fa-users"></i> Последние в чате</h2>
                <div id="user-list"></div>
            </div>
        </div>

        <div class="column">
            <div class="panel">
                <h2><i class="fas fa-ad"></i> Реклама Ai</h2>
                <textarea id="t-ads" rows="2"></textarea>
                <div class="timer-settings">
                    <input type="number" id="ads_timer" value="300"> <small>сек.</small>
                    <label class="switch"><input type="checkbox" id="ads_enabled"><span class="slider"></span></label>
                </div>
                <button class="btn-save" onclick="saveTimedTask('ads')">Сохранить</button>
            </div>

            <div class="panel" style="margin-top:20px;">
                <h2><i class="fas fa-hand-sparkles"></i> Авто-Приветствие</h2>
                <textarea id="t-greet" rows="2"></textarea>
                <div class="timer-settings">
                    <input type="number" id="greet_timer" value="1200"> <small>сек.</small>
                    <label class="switch"><input type="checkbox" id="greet_enabled"><span class="slider"></span></label>
                </div>
                <button class="btn-save" onclick="saveTimedTask('greet')">Сохранить</button>
            </div>

            <div class="panel" style="margin-top:20px; border: 1px solid #55acee;">
                <h2><i class="fas fa-share-nodes"></i> Список Соцсетей</h2>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="social-input" placeholder="Ссылка...">
                    <button class="btn-instant" onclick="addSocialLink()">+</button>
                </div>
                <div id="social-tags" style="margin-top:10px;"></div>
                <div class="timer-settings">
                    <input type="number" id="social_timer" value="600"> <small>сек.</small>
                    <label class="switch"><input type="checkbox" id="social_enabled"><span class="slider"></span></label>
                </div>
                <button class="btn-save" onclick="saveSocialSettings()">Сохранить список</button>
            </div>

            <div class="panel" style="margin-top:20px; border: 1px solid var(--red);">
                <h2><i class="fas fa-filter"></i> Фильтр матов</h2>
                <textarea id="t-bad-words" rows="2"></textarea>
                <div class="timer-settings">
                    <small>Бан:</small>
                    <input type="number" id="ban_duration" value="300"> <small>сек.</small>
                </div>
                <button class="btn-save" onclick="saveBanSettings()">Сохранить всё</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://qidsqhxufgldvdsymtyn.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpZHNxaHh1ZmdsZHZkc3ltdHluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDQyMTksImV4cCI6MjA4OTY4MDIxOX0.PnGnONyBO8PkisjzcPcWK4Mql-cZ_vZAZm0SjDsWjew';        
        const RAILWAY_URL = 'https://aleshabot-production.up.railway.app';

        const params = new URLSearchParams(window.location.search);
        const tgId = params.get('id');
        const token = params.get('token');

        let socialLinks = [];

        function getSocialIcon(url) {
            if (url.includes('t.me')) return 'fab fa-telegram';
            if (url.includes('vk.com')) return 'fab fa-vk';
            if (url.includes('youtube.com')) return 'fab fa-youtube';
            return 'fas fa-link';
        }

        function addSocialLink() {
            const val = document.getElementById('social-input').value.trim();
            if(val && !socialLinks.includes(val)) {
                socialLinks.push(val);
                renderSocialTags();
                document.getElementById('social-input').value = '';
            }
        }

        function removeSocialLink(i) { socialLinks.splice(i, 1); renderSocialTags(); }

        function renderSocialTags() {
            document.getElementById('social-tags').innerHTML = socialLinks.map((url, i) => `
                <div class="social-tag"><i class="${getSocialIcon(url)}"></i><span>${url}</span><span class="remove-link" onclick="removeSocialLink(${i})">×</span></div>
            `).join('');
        }

        async function saveSocialSettings() {
            await supabaseUpdate({
                social_text: JSON.stringify(socialLinks),
                social_timer: parseInt(document.getElementById('social_timer').value),
                social_enabled: document.getElementById('social_enabled').checked
            });
            alert("Сохранено!");
        }

        async function saveBanSettings() {
            await supabaseUpdate({
                word_filter: document.getElementById('t-bad-words').value,
                ban_duration: parseInt(document.getElementById('ban_duration').value)
            });
            alert("Сохранено!");
        }

        async function saveTimedTask(p) {
            await supabaseUpdate({
                [`${p}_text`]: document.getElementById(`t-${p}`).value,
                [`${p}_timer`]: parseInt(document.getElementById(`${p}_timer`).value),
                [`${p}_enabled`]: document.getElementById(`${p}_enabled`).checked
            });
            alert("✅ Настройки обновлены!");
        }

        async function saveField(f, id) {
            await supabaseUpdate({ [f]: document.getElementById(id).value });
            alert("✅ Сохранено!");
        }

        async function controlBot(action) {
            const stream = document.getElementById('streamUrl').value;
            await fetch(`${RAILWAY_URL}/bot_control?action=${action}&id=${tgId}&token=${token}&stream=${encodeURIComponent(stream)}`);
            alert("Команда отправлена");
        }

        async function supabaseUpdate(d) {
            await fetch(`${SB_URL}/rest/v1/users?tg_id=eq.${tgId}`, {
                method: 'PATCH',
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(d)
            });
        }

        async function loadData() {
            if(!tgId) return;
            const rUser = await fetch(`${SB_URL}/rest/v1/users?tg_id=eq.${tgId}`, {
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
            });
            const uArr = await rUser.json();
            if (uArr[0]) {
                const u = uArr[0];
                document.getElementById('stat-chat').innerText = u.stat_chat || 0;
                document.getElementById('stat-clean').innerText = u.stat_clean || 0;
                document.getElementById('t-char').value = u.bot_persona || '';
                document.getElementById('t-ads').value = u.ads_text || '';
                document.getElementById('ads_timer').value = u.ads_timer || 300;
                document.getElementById('ads_enabled').checked = u.ads_enabled;
                document.getElementById('t-greet').value = u.greet_text || '';
                document.getElementById('greet_timer').value = u.greet_timer || 1200;
                document.getElementById('greet_enabled').checked = u.greet_enabled;
                document.getElementById('t-bad-words').value = u.word_filter || '';
                document.getElementById('ban_duration').value = u.ban_duration || 300;
                socialLinks = JSON.parse(u.social_text || "[]");
                renderSocialTags();
                document.getElementById('social_timer').value = u.social_timer || 600;
                document.getElementById('social_enabled').checked = u.social_enabled;
            }
        }
        window.onload = loadData;
    </script>
</body>
</html>
