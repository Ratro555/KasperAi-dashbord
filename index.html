<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Kasper Ai 🤖</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --accent: #00ff88; --text: #ffffff; --faded: rgba(255, 255, 255, 0.5); --red: #ff4d4d; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; max-width: 1300px; }
        .panel { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #333; position: relative; margin-bottom: 20px; }
        h2 { font-size: 1rem; margin-top: 0; display: flex; align-items: center; gap: 8px; }
        .badge { background: var(--accent); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .btn-save { width: 100%; background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-red { background: var(--red) !important; color: white !important; }
        .btn-faded { opacity: 0.5 !important; pointer-events: none; }
        textarea, input { width: 100%; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; padding: 10px; box-sizing: border-box; font-size: 14px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-onoff { padding: 10px; border: 1px solid #333; background: #222; color: #fff; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .active-on { background: var(--accent) !important; color: #000 !important; }
        .active-off { background: var(--red) !important; color: #fff !important; }
        .loyalty-info { background: #000; padding: 10px; border-radius: 8px; font-size: 0.75rem; border: 1px solid #333; line-height: 1.4; }
        @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <h1>Панель Kasper Ai 🤖</h1>
    <div class="badge" id="plan-display" style="margin-bottom: 30px;">ТАРИФ: PRO</div>

    <div class="dashboard-grid">
        <div class="column">
            <div class="panel">
                <h2><i class="fas fa-chart-line"></i> Мониторинг</h2>
                <div style="display:flex; justify-content:space-around; text-align:center;">
                    <div><b id="stat-chat" style="color:var(--accent)">0</b><br><small>Чат</small></div>
                    <div><b id="stat-clean" style="color:var(--red)">0</b><br><small>Чистка</small></div>
                    <div><b id="stat-points" style="color:var(--accent)">0</b><br><small>Баллы</small></div>
                </div>
            </div>

            <div class="panel" id="p-char">
                <h2><i class="fas fa-brain"></i> Характер Kasper Ai</h2>
                <textarea id="t-char" rows="4" maxlength="1500" oninput="updateCharCount()" placeholder="Инструкция для ответов бота..."></textarea>
                <div align="right" id="count-char" style="font-size:0.7rem; color:#555;">0 / 1500</div>
                <button class="btn-save" onclick="handleSave('p-char', 'bot_persona')">Сохранить характер</button>
            </div>

            <div class="panel" id="p-filter">
                <h2><i class="fas fa-filter"></i> Фильтр слов Kasper Ai</h2>
                <textarea id="t-filter" rows="3" placeholder="Слова через запятую..."></textarea>
                <button class="btn-save" onclick="handleSave('p-filter', 'word_filter')">Сохранить фильтр</button>
            </div>
        </div>

        <div class="column">
            <div class="panel" style="border: 2px solid var(--accent);">
                <h2><i class="fas fa-play"></i> Управление Стримом</h2>
                <input type="text" id="streamUrl" placeholder="Вставь ссылку на стрим или ID" style="margin-bottom:10px;">
                <div class="btn-grid">
                    <button class="btn-save" onclick="controlBot('start')">СТАРТ</button>
                    <button class="btn-save btn-red" onclick="controlBot('stop')">СТОП</button>
                </div>
                <p id="bot-status" style="font-size:0.8rem; text-align:center; margin-top:10px; color:var(--accent)"></p>
            </div>

            <div class="panel">
                <h2><i class="fas fa-plug"></i> Подключение Ютуба</h2>
                <button class="btn-save" onclick="handleAuth('youtube')"><i class="fab fa-youtube"></i> Авторизовать канал</button>
            </div>

            <div class="panel">
                <h2><i class="fas fa-crown"></i> Лояльность</h2>
                <div class="loyalty-info">
                    1000б за подписку. 10б за сообщение.
                </div>
                <table style="width:100%; font-size:0.8rem; margin-top:10px;" id="loyalty-table">
                    <tr><td>Никнейм</td><td>Баллы</td></tr>
                    <tr><td>GamerKing</td><td>10000</td></tr>
                </table>
            </div>
        </div>

        <div class="column">
            <div class="panel">
                <h2><i class="fas fa-language"></i> Переводчик</h2>
                <div class="btn-grid">
                    <button class="btn-onoff" id="tr-on" onclick="setTranslator(true)">On</button>
                    <button class="btn-onoff" id="tr-off" onclick="setTranslator(false)">Off</button>
                </div>
            </div>

            <div class="panel" id="p-adv">
                <h2><i class="fas fa-ad"></i> Реклама Ai</h2>
                <textarea id="t-adv" rows="2" placeholder="Текст рекламы..."></textarea>
                <button class="btn-save" onclick="handleSave('p-adv', 'adv_text')">Сохранить Рекламу</button>
            </div>

            <div class="panel" id="p-social">
                <h2><i class="fas fa-link"></i> Ссылка !social</h2>
                <input type="text" id="t-social" placeholder="https://t.me/твойканал">
                <button class="btn-save" onclick="handleSave('p-social', 'social_links')">Сохранить ссылку</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://qidsqhxufgldvdsymtyn.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpZHNxaHh1ZmdsZHZkc3ltdHluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDQyMTksImV4cCI6MjA4OTY4MDIxOX0.PnGnONyBO8PkisjzcPcWK4Mql-cZ_vZAZm0SjDsWjew';        
        const RAILWAY_URL = 'https://aleshabot-production.up.railway.app';

        const urlParams = new URLSearchParams(window.location.search);
        const tgId = urlParams.get('id');
        const token = urlParams.get('token');

        // --- УПРАВЛЕНИЕ БОТОМ ---
        async function controlBot(action) {
            const url = document.getElementById('streamUrl').value;
            const status = document.getElementById('bot-status');
            status.innerText = "⏳ Жду ответа...";
            
            try {
                const res = await fetch(`${RAILWAY_URL}/bot_control?action=${action}&id=${tgId}&token=${token}&stream=${encodeURIComponent(url)}`);
                const data = await res.json();
                status.innerText = data.message;
            } catch (e) {
                status.innerText = "❌ Ошибка связи с ботом";
            }
        }

        // --- АВТОРИЗАЦИЯ ЮТУБ ---
        function handleAuth() {
            window.location.href = `${RAILWAY_URL}/login?state=${tgId}`;
        }

        // --- СОХРАНЕНИЕ ---
        async function handleSave(panelId, dbField) {
            const panel = document.getElementById(panelId);
            const btn = panel.querySelector('.btn-save');
            const area = panel.querySelector('textarea') || panel.querySelector('input');
            const val = area.value;

            btn.innerText = "⌛ Сохраняю...";
            await supabaseUpdate({ [dbField]: val });
            btn.innerText = "✅ Сохранено";
            setTimeout(() => { btn.innerText = "Сохранить изменения"; }, 2000);
        }

        async function supabaseUpdate(data) {
            await fetch(`${SB_URL}/rest/v1/users?tg_id=eq.${tgId}`, {
                method: 'PATCH',
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        }

        function updateCharCount() {
            const text = document.getElementById('t-char').value;
            document.getElementById('count-char').innerText = `${text.length} / 1500`;
        }

        function setTranslator(status) {
            document.getElementById('tr-on').className = status ? 'btn-onoff active-on' : 'btn-onoff';
            document.getElementById('tr-off').className = status ? 'btn-onoff' : 'btn-onoff active-off';
            supabaseUpdate({ translator_enabled: status });
        }

        // --- ЖИВОЙ МОНИТОРИНГ ---
        async function loadData() {
            const res = await fetch(`${SB_URL}/rest/v1/users?tg_id=eq.${tgId}`, {
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
            });
            const data = await res.json();
            if (data[0]) {
                const u = data[0];
                document.getElementById('stat-chat').innerText = u.stat_chat || 0;
                document.getElementById('stat-clean').innerText = u.stat_clean || 0;
                document.getElementById('t-char').value = u.bot_persona || '';
                document.getElementById('t-filter').value = u.word_filter || '';
                document.getElementById('t-adv').value = u.adv_text || '';
                document.getElementById('t-social').value = u.social_links || '';
                setTranslator(u.translator_enabled);
                updateCharCount();
            }
        }

        window.onload = loadData;
        setInterval(loadData, 10000); // Обновлять стату раз в 10 секунд
    </script>
</body>
</html>
